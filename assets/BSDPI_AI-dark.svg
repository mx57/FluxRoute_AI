<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="650" height="120" viewBox="0 0 650 120">
  <defs>
    <linearGradient id="accent-dark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0969DA"/>
      <stop offset="100%" style="stop-color:#8250DF"/>
    </linearGradient>
    <filter id="glow-dark">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shield icon -->
  <g transform="translate(30, 10)" filter="url(#glow-dark)">
    <path d="M45 8 L80 25 L80 55 C80 80 60 100 45 108 C30 100 10 80 10 55 L10 25 Z"
          fill="none" stroke="url(#accent-dark)" stroke-width="3"/>
    <path d="M45 20 L68 32 L68 52 C68 70 55 85 45 92 C35 85 22 70 22 52 L22 32 Z"
          fill="url(#accent-dark)" opacity="0.12"/>
    <!-- Lightning bolt inside shield -->
    <path d="M50 35 L38 58 L48 58 L42 80 L62 50 L50 50 Z"
          fill="url(#accent-dark)" opacity="0.85"/>
  </g>

  <!-- Main title -->
  <text x="145" y="62" font-family="Segoe UI, Arial, sans-serif" font-size="56" font-weight="700" fill="#1F2328" letter-spacing="2">
    BSDPI
  </text>
  <text x="380" y="62" font-family="Segoe UI, Arial, sans-serif" font-size="56" font-weight="300" fill="url(#accent-dark)" letter-spacing="2">
    _AI
  </text>

  <!-- Subtitle -->
  <text x="145" y="92" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#656D76" letter-spacing="4">
    SELF-LEARNING DPI BYPASS
  </text>
</svg>
